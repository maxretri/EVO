<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trading Staircase Journal</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Trading Staircase Journal</h1>
    <div id="scoreboard"></div>
  </header>

  <main>
    <div id="staircase"></div>
    <div id="walker" class="walk"></div>
  </main>

  <button id="addDay">Add Day</button>

  <template id="stepTemplate">
    <div class="step">
      <div class="date"></div>
      <label>Risk: <input type="number" step="0.01" class="risk" /></label>
      <label>Return: <input type="number" step="0.01" class="return" /></label>
      <label>Screenshot: <input type="file" accept="image/*" class="screenshot" /></label>
      <textarea class="notes" placeholder="Notes"></textarea>
      <img class="shot" style="display:none" />
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
